<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creatarsh | Login</title>
  <style>
    /* Reset and font */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #3a8ef6, #6f42c1);
    }

    .login-container {
      background: #fff;
      padding: 40px 35px;
      border-radius: 20px;
      box-shadow: 0 5px 25px rgba(0, 0, 0, 0.2);
      width: 350px;
      text-align: center;
    }

    .login-container h1 {
      font-size: 28px;
      color: #3a8ef6;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .login-container p {
      font-size: 14px;
      color: #777;
      margin-bottom: 25px;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #ddd;
      border-radius: 10px;
      outline: none;
      font-size: 15px;
      transition: 0.3s;
    }

    .input-group input:focus {
      border-color: #3a8ef6;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: #3a8ef6;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    .login-btn:hover {
      background: #316acc;
    }

    .links {
      margin-top: 20px;
      font-size: 14px;
    }

    .links a {
      color: #3a8ef6;
      text-decoration: none;
      font-weight: 500;
    }

    .links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 400px) {
      .login-container {
        width: 90%;
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Creatarsh</h1>
    <p>Welcome back! Please login to continue</p>
    
    <form action="dashboard.html" method="POST">
      <div class="input-group">
        <input type="text" name="username" placeholder="Username or Email" required>
      </div>
      <div class="input-group">
        <input type="password" name="password" placeholder="Password" required>
      </div>
      <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="links">
      <p><a href="#">Forgot Password?</a></p>
      <p>Don't have an account? <a href="register.html">Sign Up</a></p>
    </div>
  </div>
</body>
</html>
<script>
  document.querySelector("form").addEventListener("submit", function(e) {
    e.preventDefault();
    const email = document.querySelector("[name='username']").value;
    const password = document.querySelector("[name='password']").value;

    const user = JSON.parse(localStorage.getItem("user"));
    if (user && (user.email === email || user.name === email) && user.password === password) {
      alert("Login successful!");
      window.location.href = "dashboard.html";
    } else {
      alert("Invalid email or password.");
    }
  });
</script>
