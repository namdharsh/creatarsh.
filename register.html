<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creatarsh | Create Account</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #6f42c1, #3a8ef6);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .signup-container {
      background: #fff;
      padding: 35px 40px;
      border-radius: 20px;
      width: 380px;
      box-shadow: 0 6px 25px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    h1 {
      color: #3a8ef6;
      margin-bottom: 10px;
    }

    p {
      color: #777;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 14px;
      color: #555;
      margin-bottom: 5px;
    }

    .input-group input {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: 0.3s;
    }

    .input-group input:focus {
      border-color: #3a8ef6;
    }

    .signup-btn {
      width: 100%;
      background: #3a8ef6;
      border: none;
      color: white;
      font-size: 16px;
      font-weight: 600;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    .signup-btn:hover {
      background: #316acc;
    }

    .links {
      margin-top: 15px;
      font-size: 14px;
    }

    .links a {
      color: #3a8ef6;
      text-decoration: none;
      font-weight: 500;
    }

    .links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 400px) {
      .signup-container {
        width: 90%;
        padding: 25px;
      }
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <h1>Create Account</h1>
    <p>Join Creatarsh and start your journey!</p>

    <form id="signupForm">
      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="fullname" required />
      </div>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" required />
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" required />
      </div>
      <button type="submit" class="signup-btn">Create Account</button>
    </form>

    <div class="links">
      <p>Already have an account? <a href="login.html">Login</a></p>
    </div>
  </div>

  <script>
    // Example: Store user data in localStorage (simple version)
    document.getElementById("signupForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const name = document.getElementById("fullname").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      // Store in localStorage
      localStorage.setItem("user", JSON.stringify({ name, email, password }));
      alert("Account created successfully!");
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
