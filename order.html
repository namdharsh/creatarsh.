<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Design | CreatArsh</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    body {
      background-color: #f8f8f8;
      color: #333;
      line-height: 1.6;
    }
    a { text-decoration: none; color: inherit; }

    header {
      background: #111;
      color: #fff;
      padding: 2rem;
      text-align: center;
    }
    header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; letter-spacing: 2px; }
    header p { color: #ccc; font-size: 1.1rem; }

    nav {
      background: #222;
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 1rem 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav a { color: #fff; font-weight: 500; transition: color 0.3s; }
    nav a:hover { color: #ff4d4d; }

    .order-section {
      max-width: 1000px;
      margin: 3rem auto;
      background: #fff;
      padding: 3rem;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .order-section h2 {
      text-align: center;
      color: #ff4d4d;
      margin-bottom: 1rem;
      font-size: 2.2rem;
    }

    .order-section p {
      text-align: center;
      margin-bottom: 2rem;
      color: #555;
    }

    form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    form .full-width { grid-column: 1 / -1; }

    label { font-weight: 500; margin-bottom: 0.3rem; display: block; }
    input, select, textarea {
      width: 100%;
      padding: 0.8rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
      transition: border 0.3s;
    }
    input:focus, select:focus, textarea:focus { border-color: #ff4d4d; outline: none; }

    button {
      background: #ff4d4d;
      color: white;
      border: none;
      padding: 1rem;
      border-radius: 10px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.3s;
      grid-column: 1 / -1;
    }
    button:hover { background: #e03e3e; }

    @media(max-width: 768px){
      form { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <h1>CreatArsh</h1>
    <p>Design Your Vision with Us</p>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="about.html">About</a>
    <a href="order.html">Order</a>
    <a href="index.html#contact">Contact</a>
  </nav>

  <section class="order-section">
    <h2>Place Your Order</h2>
    <p>Fill out the form below to help us understand your project in detail. The more information you provide, the better we can serve you.</p>

    <form action="#" method="post">
      <div>
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required />
      </div>

      <div>
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required />
      </div>

      <div>
        <label for="service">Select Service</label>
        <select id="service" name="service" required>
          <option value="">-- Select Service --</option>
          <option value="logo">Logo Design</option>
          <option value="social-media">Social Media Graphics</option>
          <option value="poster">Poster & Banner Design</option>
          <option value="branding">Branding Package</option>
        </select>
      </div>

      <div>
        <label for="deadline">Preferred Deadline</label>
        <input type="date" id="deadline" name="deadline" />
      </div>

      <div>
        <label for="budget">Estimated Budget (INR)</label>
        <input type="number" id="budget" name="budget" placeholder="e.g. 5000" />
      </div>

      <div>
        <label for="audience">Target Audience</label>
        <input type="text" id="audience" name="audience" placeholder="Who is this design for?" />
      </div>

      <div>
        <label for="platform">Platform / Medium</label>
        <input type="text" id="platform" name="platform" placeholder="Website, social media, print, etc." />
      </div>

      <div class="full-width">
        <label for="details">Project Details / Requirements</label>
        <textarea id="details" name="details" rows="6" placeholder="Describe your project in detail..." required></textarea>
      </div>

      <div class="full-width">
        <label for="reference">Reference Images / Inspiration</label>
        <textarea id="reference" name="reference" rows="4" placeholder="Paste links or describe references here"></textarea>
      </div>

      <button type="submit">Submit Order</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2025 CreatArsh. All rights reserved.</p>
  </footer>

</body>
</html>
